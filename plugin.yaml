name: daedalus
version: 1.0.0-beta.16
source: https://github.com/benmarte/daedalus
description: "Hermes Daedalus — issue/spec → reviewed-PR automation with kanban dispatch, GitHub/GitLab/Azure DevOps board syncing, and multi-platform notifications."
author: "Ben Marte"
# NOTE: no requires_env on purpose — VCS tokens (GITHUB_TOKEN / GITLAB_TOKEN /
# AZURE_DEVOPS_PAT) are per-provider optional and resolved at runtime per
# project; declaring them here would disable the whole plugin when absent
# (kanban-only and single-provider setups must keep working).
