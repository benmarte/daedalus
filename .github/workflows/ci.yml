name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Install deps
        run: pip install --quiet pyyaml fastapi pytest httpx pytest-xdist pytest-timeout filelock
      # Plain-script smoke test (uses custom check() runner).
      - name: Plain-script suite (real assertions via custom runner)
        run: python3 tests/test_daedalus.py
      # Parallel pytest with per-test timeout — runs under 10 min on CI.
      - name: Pytest suites (parallel, with timeout)
        run: pytest tests/ -n auto --timeout=60

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Install ruff
        run: pip install --quiet ruff
      - name: Ruff check (whole repo)
        run: ruff check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Install mypy + runtime stubs
        run: pip install --quiet mypy pyyaml fastapi httpx
      # Scope: new split packages + small clean modules. Legacy modules are
      # baseline-ignored in pyproject.toml [tool.mypy.overrides] (see #1262).
      - name: Mypy (scoped packages)
        run: python3 -m mypy core/dispatch/ core/iterate/ core/util.py core/db.py config/

  ci-complete:
    needs: [test, lint, typecheck]
    runs-on: ubuntu-latest
    steps:
      - run: echo "all required checks passed"
