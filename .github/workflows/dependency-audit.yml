name: Dependency Audit

on:
  schedule:
    # Weekly on Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  pull_request:
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - '.github/workflows/dependency-audit.yml'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Install project dependencies
        run: |
          # Install runtime deps so pip-audit can scan the full
          # dependency tree (including transitives) from the environment.
          pip install --requirement requirements.txt

      - name: Audit dependencies for known CVEs
        run: |
          # --strict: fail (exit 1) on any vulnerability finding
          # --desc: include vulnerability descriptions in output
          pip-audit --strict --desc