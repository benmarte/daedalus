name: Update Changelog

on:
  pull_request:
    types: [closed]

jobs:
  update-changelog:
    # Run only when the PR was merged (not just closed) into the `dev` branch.
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'dev'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update CHANGELOG.md
        # PR title is attacker-controlled (set by PR author), so it must be
        # passed via env: with double-quoted expansion — NEVER interpolated
        # inline into `run:`. env: values are set by Actions before shell eval,
        # so shell metacharacters in the title cannot escape into commands.
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Placeholder step for automated changelog generation (epic #1386).
          # Follow-up tasks will add the actual CHANGELOG.md update logic here
          # (e.g., appending a grouped entry derived on the merged PR title/body).
          echo "merged PR #${PR_NUMBER}: ${PR_TITLE}" >> /tmp/changelog-entry.txt
          cat /tmp/changelog-entry.txt
