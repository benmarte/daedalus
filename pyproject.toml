[project]
name = "daedalus"
version = "0.1.0"
description = "Hermes Daedalus pipeline plugin"
requires-python = ">=3.10"
dependencies = [
    "pyyaml>=6.0",
    "httpx>=0.24",
    "fastapi>=0.100",
    "filelock>=3.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--tb=short -q"
filterwarnings = [
    "ignore::DeprecationWarning",
]
xfail_strict = true
