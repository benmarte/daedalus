# ──────────────────────────────────────────────────────────────────────────────
# Daedalus Per-Repo Configuration
#
# Scaffolded by scripts/setup.sh — edit to fit your project.
# The daedalus reads this file to drive the autonomous issue→PR pipeline.
#
# Placeholders ({{…}}) are filled in by setup.sh on first run.
# Re-running setup.sh is idempotent — it will not overwrite this file
# unless you pass --force.
# ──────────────────────────────────────────────────────────────────────────────

# ── Identity ─────────────────────────────────────────────────────────────────
name: "{{NAME}}"                        # Human-readable project name
repo: "{{REPO}}"                        # owner/repo (GitHub) or group/project (GitLab)
workdir: "{{WORKDIR}}"                  # Absolute path to the repo root

# ── Board tracking (optional) ─────────────────────────────────────────────────
tracking:
  # GitHub: set your Project (v2) board number to enable two-way status syncing
  # (Hermes Kanban ↔ GitHub Project).
  # github_project_number: 1
  #
  # GitLab: status syncing is label-driven (Issue Board lists keyed to the
  # status_map labels below). Opt in with:
  # label_board: true
  #
  # Azure DevOps: board columns map to work-item states automatically — no key
  # needed; the status_map values below must match your states.

# ── VCS provider ──────────────────────────────────────────────────────────────
# All access is via token-authenticated HTTPS APIs. Tokens come ONLY from
# environment variables — never put a token in this file.
vcs:
  provider: "github"                    # github | gitlab | azuredevops
  #                                     # setup.sh and the dashboard auto-detect
  #                                     # this from the repo's origin remote
  target_branch: "dev"                  # Base branch for PRs (dev, main, master…)

  # token_env: "GITHUB_TOKEN"           # Override the env var holding the API token.
  #                                     # Defaults: GITHUB_TOKEN/GH_TOKEN (github),
  #                                     # GITLAB_TOKEN (gitlab), AZURE_DEVOPS_PAT (azuredevops)
  # verify_ssl: true                    # Set to false to disable SSL certificate verification.
  #                                     # Useful for self-hosted instances with self-signed certs.
  #                                     # Defaults to true.

  # GitLab only (provider: gitlab) — defaults to top-level `repo` as the path:
  # base_url: "https://gitlab.com"      # Self-hosted GitLab URL
  # project_path: "group/project"       # OR use the numeric id:
  # project_id: 12345

  # Azure DevOps only (provider: azuredevops):
  # org: "my-org"
  # project: "MyProject"
  # repo: "my-repo"
  # work_item_type: "Issue"             # Work-item type polled as "issues"
  # closed_state: "Done"                # State applied when an issue is closed

  # Canonical pipeline status → your board's column/label/state names:
  status_map:
    ready: "Ready"
    in_progress: "In progress"
    in_review: "In review"
    done: "Done"

# ── Sources ──────────────────────────────────────────────────────────────────
# Which triggers the daedalus watches for this repo. ALL are on by default —
# VCS issues, spec/plan .md drops, and manual kanban triage cards all work
# out of the box; disable whichever you don't want.
sources:
  github_issues:
    enabled: true                       # Poll the VCS provider's issues/work items
  local_specs:
    enabled: true                       # Watch .hermes/pending/ for spec/plan files
  kanban_triage:
    enabled: true                       # Kanban-only triage cards (no VCS source)

# ── Cron + Notifications ──────────────────────────────────────────────────────
cron:
  schedule: "0 * * * *"                 # How often daedalus polls — crontab syntax preferred (Repeat: ∞)
  deliver: ""                           # Legacy single target: slack:C123, discord:1234567890123456789, …

  # Multi-target notifications (takes precedence over `deliver` when set).
  # Targets are `hermes send` strings for ANY configured Hermes platform
  # (Slack, Discord, Telegram, Signal, WhatsApp, …). `events` filters what a
  # target receives; omit it to receive everything.
  # Events: doc-report | dispatch-summary | pipeline-failure | pr-ready
  #         | security-escalation | comment-mirror
  #
  # ⚠️ Comment threading (since beta.30): daedalus mirrors every agent comment
  # on an issue and its linked PR into ONE persistent thread per target — so the
  # whole pipeline conversation is readable without leaving chat. This is the
  # `comment-mirror` event. It works automatically; no new config keys needed.
  # A CATCH-ALL entry (no `events` filter, or `events: []`) receives
  # `comment-mirror` too, so active boards will see a higher message volume than
  # before. To exclude it, list the events you DO want and leave it out.
  # notifications:
  #   - platform: "Slack"
  #     target: "slack:C0CHANNEL1"
  #     events: ["doc-report", "pipeline-failure"]  # no comment-mirror → no threads
  #   - platform: "Discord"
  #     target: "discord:1234567890123456789"  # numeric channel ID (not name)
  #     events: ["dispatch-summary", "pr-ready", "comment-mirror"]

# ── Execution tunables ────────────────────────────────────────────────────────
execution:
  # How many issues the dispatcher spawns per tick (default: 5). Caps how many
  # coding agents can be launched at once — keep it low (e.g. 2-4) on memory-
  # constrained hosts to avoid OOM-killing parallel coding agents (issue #141).
  # max_dispatch: 5

  # Iterations per agent (how many back-and-forth steps each agent gets).
  # iterations: 5

  # Hours before an in-progress issue with no PR triggers a staleness warning
  # comment on the issue. Set to 0 to disable. (default: 48)
  # staleness_hours: 48

  # Maximum total changed lines allowed in a PR before a human-review warning
  # comment is posted. Set to 0 to disable. (default: disabled)
  # max_pr_lines: 500

  # File-name patterns that trigger a human-review warning when present in a PR.
  # Glob syntax. Defaults cover common secret / credential files.
  # forbidden_files:
  #   - ".env"
  #   - "*.pem"
  #   - "*.key"
  #   - "*.p12"
  #   - "*.pfx"
  #   - ".env.*"
  #   - "*.secrets"
  #   - "secrets.*"

  # Custom Hermes profile names and skills per pipeline role.
  # Override any role to route tasks to your own agent profiles instead of the
  # built-in daedalus profiles.  Only the keys you specify are overridden;
  # unspecified roles continue to use the built-in defaults.
  #
  # Built-in defaults (shown for reference):
  #   validator: validator-daedalus
  #   pm:        project-manager-daedalus
  #   developer: developer-daedalus
  #   reviewer:  reviewer-daedalus
  #   security:  security-analyst-daedalus
  #   documentation: documentation-daedalus
  #
  # Simple form — just a profile name:
  # profiles:
  #   developer: my-senior-dev-profile
  #   reviewer:  my-code-reviewer-profile
  #
  # Dict form — profile name + extra skills to attach to that agent:
  # profiles:
  #   developer:
  #     profile: my-senior-dev-profile
  #     skills:
  #       - my-custom-skill
  #       - another-skill
  #   validator:
  #     profile: validator-daedalus
  #     skills:
  #       - security-and-hardening
  #
  # Skills listed under a role are passed to the agent via --skill when the task
  # is created, so the agent has them pre-loaded without calling skill_view()
  # itself.  The built-in profile skills are always installed; this adds extras
  # on top.  You can mix simple and dict forms in the same profiles block.
  #
  # Behavior when a configured profile does not exist in Hermes (checked via
  # ~/.hermes/profiles/<name>/ directory or <name>.yaml file):
  #   fallback  — (default) log a warning and fall back to the built-in default
  #               profile for that role. Dispatching continues normally.
  #   skip      — log a warning and drop the role entirely. No tasks are created
  #               for that role until the profile is configured.
  # profile_fallback_behavior: "fallback"

  # Comment attribution header — prepended to every VCS comment the dispatcher
  # posts (PR warnings, staleness alerts).  Agents also embed this pattern in
  # their own comments so all pipeline activity is clearly identified.
  #
  # Supported placeholders: {role}, {profile}, {issue}, {pr}.
  # Defaults to "**Agent: {role}**" if omitted.
  #
  # Examples:
  #   comment_header_template: "**Agent: {role}** | {profile}"
  #   comment_header_template: "🤖 _{role} agent_"
  # comment_header_template: "**Agent: {role}**"

  # Per-label agent roster overrides — adjust which roles are activated for
  # issues carrying a specific label.  Keys are exact label names.
  #
  # Supported flags:
  #   skip_developer: true   — omit the developer agent (e.g. for pure-docs tasks)
  #   security_first: true   — run security analyst before developer
  #
  # label_overrides:
  #   documentation:
  #     skip_developer: true
  #   security:
  #     security_first: true

  # Which coding agent handles developer tasks. Controls how coding work is
  # delegated: the dispatcher injects delegation instructions into task bodies
  # so the developer agent knows how to use the configured coding agent.
  #
  # Options (default: hermes):
  #   hermes       — use Hermes delegate_task to spawn a subagent
  #                    with the coding-agents skill pre-loaded. The subagent
  #                    runs the configured coding agent CLI (claude-code, codex,
  #                    or opencode) in one-shot mode.
  #   claude-code  — delegate to Claude Code CLI (one-shot -p mode preferred)
  #   codex        — delegate to OpenAI Codex CLI (exec mode)
  #   opencode     — delegate to OpenCode CLI (run mode)
  #   none         — no delegation; developer agent does coding directly
  #
  # When set to a CLI agent (claude-code/codex/opencode), the developer SOUL.md
  # instructs the agent to spawn the external coding tool via terminal(background=True)
  # rather than implementing code directly. The coding-agents skill is
  # automatically attached to the developer profile when delegation is enabled.
  #
  # coding_agent: hermes

  # Shell command used by the developer agent to spawn the external coding agent
  # via terminal(background=True). Must be the full command (not a shell alias).
  # For Claude Code: use the absolute binary path + flags.
  # Example: "CLAUDE_CONFIG_DIR=$HOME/.claude /usr/local/bin/claude --dangerously-skip-permissions -p"
  #
  # coding_agent_cmd: ""

  # When coding_agent is set to a CLI agent, which model/backend should the
  # coding agent use? Passes through to the agent's --model flag where applicable.
  # If omitted, the agent uses its default model.
  #
  # coding_agent_model: ""

  # Max turns/iterations for delegated coding agent sessions. Prevents runaway
  # agent loops. Defaults to 10 for one-shot modes.
  #
  # coding_agent_max_turns: 10

  # Wall-clock ceiling (seconds) the worker waits for a spawned coding agent to
  # write its output before failing the card fast (issue #141). A dead agent is
  # caught immediately via a PID liveness check; this is the backstop for an
  # agent that is alive but hung. On exceed the card is blocked
  # ('coding-agent-failed: CODING_AGENT_TIMEOUT') and retried per failure_limit.
  # Defaults to 3600 (1 hour).
  #
  # coding_agent_max_wait: 3600
